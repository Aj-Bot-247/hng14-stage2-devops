name: HNG Stage 2 Pipeline

on:
  push:
    branches:
      - main
      - fix/initial-bugs # Running on our current branch so we can test it before merging!

jobs:
  lint:
    name: Lint Code & Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/main.py worker/worker.py --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Lint JavaScript (eslint)
        run: |
          npm install -g eslint@8.57.0
          echo '{"env": {"node": true, "es2021": true}, "extends": "eslint:recommended", "parserOptions": {"ecmaVersion": 12}}' > .eslintrc.json
          eslint frontend/app.js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  test:
    name: Run Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Run Pytest with Coverage
        run: |
          cd api
          pytest --cov=. --cov-report=xml

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
          retention-days: 7