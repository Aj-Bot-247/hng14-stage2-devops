name: HNG Stage 2 Pipeline

on:
  push:
    branches:
      - main
      - fix/initial-bugs # Running on our current branch so we can test it before merging!

jobs:
  lint:
    name: Lint Code & Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/main.py worker/worker.py --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Lint JavaScript (eslint)
        run: |
          npm install -g eslint@8.57.0
          echo '{"env": {"node": true, "es2021": true}, "extends": "eslint:recommended", "parserOptions": {"ecmaVersion": 12}}' > .eslintrc.json
          eslint frontend/app.js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  test:
    name: Run Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt

      - name: Run Pytest with Coverage
        run: |
          cd api
          pytest --cov=. --cov-report=xml

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
          retention-days: 7
          
  build-scan-integration:
    name: Build, Scan & Integration Test
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API Image explicitly for Scanning
        run: docker build -t hng-api:latest ./api

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'hng-api:latest'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'

      - name: Create Test Environment File
        run: |
          touch .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_PASSWORD=ci_test_password" >> .env
          echo "APP_ENV=test" >> .env
          echo "API_URL=http://api:8000" >> .env
          echo "PORT=3000" >> .env

      - name: Start Complete Application Stack
        run: docker compose up --build -d

      - name: Run Integration Tests
        run: |
          echo "Waiting for all containers to pass healthchecks..."
          sleep 20
          curl --fail http://localhost:3000 || exit 1

  deploy:
    name: Deploy to Production
    needs: build-scan-integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            # Create a directory for the app if it doesn't exist
            mkdir -p ~/hng14-stage2-prod
            cd ~/hng14-stage2-prod

            # If the repo isn't cloned yet, clone it. Otherwise, pull the latest changes.
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # Create production environment variables
            touch .env
            echo "REDIS_HOST=redis" > .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=secure_prod_password" >> .env
            echo "APP_ENV=production" >> .env
            echo "API_URL=http://api:8000" >> .env
            echo "PORT=3000" >> .env

            # Rebuild and restart the containers in detached mode
            docker compose up --build -d